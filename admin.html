<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Backend | Fabbly</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        .admin-container {
            max-width: 800px;
            margin: 4rem auto;
            padding: 2rem;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .admin-header {
            margin-bottom: 2rem;
            text-align: center;
        }
        .admin-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .form-group label {
            font-weight: 600;
        }
        .form-group input {
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: inherit;
        }
        .btn-upload {
            background: #000;
            color: #fff;
            border: none;
            padding: 1rem;
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
        }
        .btn-upload:hover {
            background: #333;
        }
        .product-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .admin-product-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            border: 1px solid #eee;
            border-radius: 4px;
        }
        .admin-product-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .admin-product-img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 4px;
            background: #f0f0f0;
        }
        .btn-delete {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-delete:hover {
            background: #c0392b;
        }
    </style>
</head>
<body style="background-color: #FAFAFA;">
    <header class="header">
        <div class="header-top container">
            <div class="logo-container">
                <a href="index.html">
                    <img src="672806512_2048362706102132_3763652892459774303_n.jpg" alt="Fabbly Logo" class="brand-logo">
                </a>
            </div>
            <div class="nav-right">
                <a href="index.html" class="btn" style="border: 1px solid #000; padding: 0.5rem 1rem; text-decoration: none; color: #000;">Back to Site</a>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="admin-container">
            <div class="admin-header">
                <h1 style="font-family: 'Playfair Display', serif;">Manage Products</h1>
                <p>Upload new products or delete existing ones.</p>
            </div>

            <form class="admin-form" id="addProductForm">
                <div class="form-group">
                    <label for="productName">Product Name</label>
                    <input type="text" id="productName" required placeholder="e.g. Signature Black Tee">
                </div>
                <div class="form-group">
                    <label for="productPrice">Price (BDT)</label>
                    <input type="number" id="productPrice" required placeholder="e.g. 1200">
                </div>
                <div class="form-group">
                    <label for="productDescription">Description</label>
                    <textarea id="productDescription" required placeholder="Enter product description" rows="3" style="padding: 0.75rem; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; resize: vertical;"></textarea>
                </div>
                <div class="form-group">
                    <label>Available Sizes</label>
                    <div style="display: flex; gap: 1rem; align-items: center;">
                        <label style="font-weight: normal; display: flex; align-items: center; gap: 0.25rem;"><input type="checkbox" name="productSize" value="38"> 38</label>
                        <label style="font-weight: normal; display: flex; align-items: center; gap: 0.25rem;"><input type="checkbox" name="productSize" value="40"> 40</label>
                        <label style="font-weight: normal; display: flex; align-items: center; gap: 0.25rem;"><input type="checkbox" name="productSize" value="42" checked> 42</label>
                        <label style="font-weight: normal; display: flex; align-items: center; gap: 0.25rem;"><input type="checkbox" name="productSize" value="44"> 44</label>
                        <label style="font-weight: normal; display: flex; align-items: center; gap: 0.25rem;"><input type="checkbox" name="productSize" value="46"> 46</label>
                        <label style="font-weight: normal; display: flex; align-items: center; gap: 0.25rem;"><input type="checkbox" name="productSize" value="S"> S</label>
                        <label style="font-weight: normal; display: flex; align-items: center; gap: 0.25rem;"><input type="checkbox" name="productSize" value="M"> M</label>
                        <label style="font-weight: normal; display: flex; align-items: center; gap: 0.25rem;"><input type="checkbox" name="productSize" value="L"> L</label>
                        <label style="font-weight: normal; display: flex; align-items: center; gap: 0.25rem;"><input type="checkbox" name="productSize" value="XL"> XL</label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="productImage">Product Image</label>
                    <input type="file" id="productImage" accept="image/*" required>
                </div>
                <button type="submit" class="btn-upload">Upload Product</button>
            </form>

            <hr style="border: 0; border-top: 1px solid #eee; margin: 2rem 0;">

            <div class="admin-header" style="margin-bottom: 1rem; text-align: left;">
                <h2>Current Products</h2>
            </div>
            <div class="product-list" id="adminProductList">
                <!-- Products will be injected here -->
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const form = document.getElementById('addProductForm');
            const productList = document.getElementById('adminProductList');
            const fileInput = document.getElementById('productImage');
            const uploadBtn = form.querySelector('.btn-upload');

            let products = [];

            async function renderProducts() {
                productList.innerHTML = '<p>Loading products...</p>';
                products = await window.fetchProducts();
                
                if (products.length === 0) {
                    productList.innerHTML = '<p>No products available. Upload one above!</p>';
                    return;
                }

                productList.innerHTML = '';
                products.forEach((product, index) => {
                    const item = document.createElement('div');
                    item.className = 'admin-product-item';
                    item.innerHTML = `
                        <div class="admin-product-info">
                            <img src="${product.image}" alt="${product.name}" class="admin-product-img">
                            <div>
                                <h4 style="margin: 0;">${product.name}</h4>
                                <p style="margin: 0; color: #666;">৳${product.price}</p>
                            </div>
                        </div>
                        <button class="btn-delete" onclick="deleteProduct('${product.id}')">Delete</button>
                    `;
                    productList.appendChild(item);
                });
            }

            form.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const file = fileInput.files[0];
                if (!file) return;
                
                uploadBtn.textContent = 'Uploading...';
                uploadBtn.disabled = true;

                const reader = new FileReader();
                reader.onload = async function(event) {
                    const base64Image = event.target.result;
                    const selectedSizes = Array.from(document.querySelectorAll('input[name="productSize"]:checked')).map(cb => cb.value);
                    
                    const newProduct = {
                        name: document.getElementById('productName').value,
                        price: document.getElementById('productPrice').value,
                        description: document.getElementById('productDescription').value,
                        sizes: selectedSizes.length > 0 ? selectedSizes : ['38', '40', '42', '44', '46'],
                        image: base64Image
                    };

                    try {
                        await db.collection('products').add(newProduct);
                        form.reset();
                        await renderProducts();
                        alert('Product uploaded successfully!');
                    } catch (err) {
                        console.error(err);
                        alert('Error uploading product.');
                    } finally {
                        uploadBtn.textContent = 'Upload Product';
                        uploadBtn.disabled = false;
                    }
                };
                reader.readAsDataURL(file);
            });

            window.deleteProduct = async function(id) {
                if(confirm('Are you sure you want to delete this product?')) {
                    try {
                        await db.collection('products').doc(id).delete();
                        await renderProducts();
                    } catch (err) {
                        console.error(err);
                        alert('Error deleting product.');
                    }
                }
            };

            await renderProducts();
        });
    </script>
</body>
</html>
